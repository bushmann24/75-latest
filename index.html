<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>75 Hard Challenge</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* Globals & overrides */
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body { background-color: #ffffff; color: #0f172a; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
        
        /* UI Components */
        .glass { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04); }
        .grid-box { aspect-ratio: 1/1; border-radius: 6px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transition: all 0.2s; }
        
        /* Input styling */
        input[type="checkbox"]:checked + .task-text { text-decoration: line-through; opacity: 0.4; color: #94a3b8; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        #backupModal textarea { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex justify-center pb-20">
    <div id="app" class="w-full max-w-xl"></div>
    
    <div id="backupModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 shadow-2xl w-full max-w-lg border border-slate-200">
            <h4 id="modalTitle" class="text-xl font-black italic uppercase text-slate-950 mb-1">Data Lifeline</h4>
            <p id="modalDesc" class="text-slate-600 text-xs mb-6">Text this code to yourself to backup progress, or paste a code to restore.</p>
            
            <div id="copySection">
                <textarea id="backupCodeDisplay" readonly class="w-full h-40 bg-slate-50 border border-slate-200 rounded-xl p-4 text-[10px] font-mono text-slate-700 mb-6 select-all focus:outline-none focus:border-slate-300"></textarea>
                
                <div class="flex gap-3">
                    <button onclick="closeBackupModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-black uppercase rounded-xl transition">Close</button>
                    <button onclick="copyBackupCode()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white text-xs font-black uppercase rounded-xl transition shadow-md">Copy Code</button>
                </div>
                
                <div id="restoreDivider" class="border-t border-slate-100 mt-8 pt-8"></div>
            </div>
            
            <div id="restoreSection">
                <p id="restoreTitle" class="text-[10px] text-slate-500 font-bold uppercase mb-2">Restore Progress</p>
                <div class="flex gap-2">
                    <input type="text" id="restoreInput" placeholder="Paste your backup code here..." class="flex-1 bg-white border border-slate-300 rounded-xl p-3 text-xs focus:outline-none focus:border-blue-500">
                    <button onclick="restoreData()" class="py-3 px-6 bg-slate-900 hover:bg-slate-800 text-white text-xs font-black uppercase rounded-xl transition">Restore</button>
                </div>
                <button id="restoreOnlyClose" onclick="closeBackupModal()" class="hidden w-full mt-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-black uppercase rounded-xl transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. LOCAL STORAGE (INDEXED_DB) FOR PHOTOS ---
        window.photoCache = {}; 
        const dbName = "75HardOfflineDB";
        let db;

        const initDB = new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 1);
            request.onerror = (event) => { console.error("DB Error", event); reject(); };
            request.onupgradeneeded = (event) => {
                db = event.target.result;
                if (!db.objectStoreNames.contains("photos")) {
                    db.createObjectStore("photos"); 
                }
            };
            request.onsuccess = (event) => {
                db = event.target.result;
                const transaction = db.transaction(["photos"], "readonly");
                const store = transaction.objectStore("photos");
                const getAll = store.getAll();
                const getKeys = store.getAllKeys();
                
                getAll.onsuccess = () => {
                    getKeys.onsuccess = () => {
                        getKeys.result.forEach((key, i) => {
                            window.photoCache[key] = getAll.result[i];
                        });
                        resolve();
                    };
                };
            };
        });

        // Config defaults
        const DEFAULT_TASKS = [
            "Take a daily progress pic",
            "1st 45 minute workout",
            "Read 10 pages of a book",
            "2nd 45 minute workout (outside)",
            "No cheat meals or alcohol"
        ];

        // Init state
        let state = JSON.parse(localStorage.getItem('75hard_state')) || {
            name: "",
            waterGoal: 4000, 
            calorieGoal: 2500, 
            tasks: [...DEFAULT_TASKS],
            locked: false,
            editingRules: false, 
            completedDays: [],
            incompleteDays: [],
            metrics: {}, 
            viewingDay: 1, 
            view: 'setup'
        };

        // State sanitization for backwards compatibility
        if (!state.incompleteDays) state.incompleteDays = [];
        if (!state.metrics) state.metrics = {};
        if (!state.waterGoal) state.waterGoal = 4000;
        if (!state.calorieGoal) state.calorieGoal = 2500;
        
        state.editingRules = false;

        // Helpers
        function getActiveDay() {
            if (state.completedDays.length === 0 && state.incompleteDays.length === 0) return 1;
            return Math.max(0, ...state.completedDays, ...state.incompleteDays) + 1;
        }

        if (state.locked && state.view === 'setup') {
            if (getActiveDay() > 75) {
                state.view = 'victory';
            } else {
                state.view = 'grid';
            }
        }

        function save() {
            localStorage.setItem('75hard_state', JSON.stringify(state));
            render();
        }

        // Router / Main Render
        function render() {
            const root = document.getElementById('app');
            if (state.view === 'setup') renderSetup(root);
            else if (state.view === 'grid') renderGrid(root);
            else if (state.view === 'daily') renderDaily(root);
            else if (state.view === 'victory') renderVictory(root);
        }

        // --- VICTORY CONFETTI ANIMATION ---
        function fireVictoryConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // Views
        function renderSetup(root) {
            let tasksHtml = '';

            if (!state.editingRules) {
                tasksHtml = `
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 text-center">Your Non-Negotiables</label>
                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 mb-2 shadow-inner">
                        ${state.tasks.map((t, i, arr) => `
                            <div class="text-sm text-slate-950 font-bold text-center ${i !== arr.length - 1 ? 'border-b border-slate-200 pb-3 mb-3' : ''}">
                                ${t}
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                tasksHtml = `
                    <label class="block text-xs font-bold text-blue-600 uppercase tracking-widest mb-4">Edit Your Rules</label>
                    <div id="task-list" class="space-y-3 mb-4">
                        ${state.tasks.map((t, i) => `
                            <div class="flex gap-2">
                                <input type="text" onchange="updateTask(${i}, this.value)" value="${t}" class="w-full bg-white border border-slate-300 rounded-xl p-3 text-sm text-slate-950 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                                <button onclick="removeTask(${i})" class="bg-red-500/10 text-red-600 px-4 rounded-xl font-bold hover:bg-red-500/20 transition">✕</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addTask()" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 font-bold uppercase text-xs hover:border-slate-400 hover:text-slate-600 transition mb-2">+ Add Custom Rule</button>
                `;
            }

            root.innerHTML = `
                <div class="pt-8 animate-fade-in">
                    <h1 class="text-3xl sm:text-4xl font-black italic uppercase tracking-tight text-slate-950 mb-2 pr-2">75 HARD</h1>
                    <p class="text-slate-600 text-sm font-bold uppercase tracking-widest mb-8">Commit to the journey.</p>
                    
                    <div class="glass p-6 rounded-3xl mb-8 shadow-xl">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Your Name</label>
                        <input type="text" id="userName" value="${state.name}" placeholder="Enter your name..." class="w-full bg-white border border-slate-300 rounded-xl p-4 text-slate-950 font-bold mb-6 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Daily Targets</label>
                        <div class="flex gap-3 mb-8">
                            <div class="flex-1">
                                <label class="block text-[10px] text-blue-600 font-bold uppercase mb-1">Water (ml)</label>
                                <input type="number" id="setupWater" value="${state.waterGoal}" class="w-full bg-white border border-slate-300 rounded-xl p-3 text-slate-950 font-bold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-orange-600 font-bold uppercase mb-1">Calories (kcal)</label>
                                <input type="number" id="setupCals" value="${state.calorieGoal}" class="w-full bg-white border border-slate-300 rounded-xl p-3 text-slate-950 font-bold focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                            </div>
                        </div>

                        ${tasksHtml}
                    </div>

                    <button onclick="lockIn()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl uppercase tracking-widest shadow-xl shadow-blue-600/20 transition active:scale-95">Lock It In</button>
                    
                    <div class="mt-8 text-center flex flex-col items-center gap-6">
                        <button onclick="toggleEditRules()" class="border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-slate-900 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition shadow-md">
                            ${state.editingRules ? "Done Editing" : "Edit the non-negotiables"}
                        </button>
                        
                        <button onclick="openBackupModal('restore-only')" class="text-slate-400 hover:text-slate-600 text-[9px] font-black uppercase tracking-[0.1em] transition border border-slate-200 px-3 py-1.5 rounded-lg">Restore Previous Save</button>
                    </div>
                </div>
            `;
        }

        function renderGrid(root) {
            const activeDay = getActiveDay();
            const isGameOver = activeDay > 75;
            const isPerfect = state.completedDays.length === 75;
            
            let gridHtml = '';
            
            for (let i = 1; i <= 75; i++) {
                const isDone = state.completedDays.includes(i);
                const isFailed = state.incompleteDays.includes(i);
                const isActive = i === activeDay && !isGameOver;
                const isFuture = i > activeDay;

                // Grab local photo if it exists
                const localPhotoData = window.photoCache[i];
                
                let classes = "grid-box relative overflow-hidden ";
                let content = i;
                let tag = "div";
                let onClick = "";
                
                let styleAttr = localPhotoData ? `style="background-image: url('${localPhotoData}'); background-size: cover; background-position: center;"` : "";
                let overlay = localPhotoData ? `<div class="absolute inset-0 bg-black/40 z-0"></div>` : "";
                let textClass = localPhotoData ? "z-10 text-white font-bold drop-shadow-md" : "z-10";

                if (isActive) {
                    tag = "button";
                    classes += localPhotoData ? "border-blue-500 shadow-lg shadow-blue-500/20 hover:brightness-110 cursor-pointer" : "border-blue-500 text-blue-600 animate-pulse hover:bg-blue-600 hover:text-white cursor-pointer shadow-lg shadow-blue-500/20";
                    onClick = `onclick="openDay(${i})"`;
                } else if (isDone) {
                    tag = "button";
                    if (isGameOver) {
                        classes += localPhotoData ? "border-yellow-500 shadow-md shadow-yellow-500/30 hover:brightness-110 cursor-pointer" : "bg-gradient-to-br from-yellow-400 to-yellow-500 border-yellow-500 text-yellow-950 shadow-md shadow-yellow-500/30 hover:brightness-110 cursor-pointer";
                        content = i; 
                    } else {
                        classes += localPhotoData ? "border-green-500 shadow-lg shadow-green-500/20 hover:brightness-110 cursor-pointer" : "bg-green-500 border-green-500 text-white shadow-lg shadow-green-500/20 hover:bg-green-600 cursor-pointer";
                        content = '✓'; 
                    }
                    onClick = `onclick="openDay(${i})"`;
                } else if (isFailed) {
                    tag = "button";
                    classes += localPhotoData ? "border-orange-600 shadow-lg shadow-orange-500/20 hover:brightness-110 cursor-pointer" : "bg-orange-600 border-orange-600 text-white shadow-lg shadow-orange-500/20 hover:bg-orange-700 cursor-pointer";
                    if (!isGameOver) {
                        content = '✕'; 
                    }
                    onClick = `onclick="openDay(${i})"`;
                } else if (isFuture) {
                    classes += "bg-slate-100 text-slate-400 opacity-40 cursor-not-allowed";
                }
                
                gridHtml += `<${tag} ${onClick} class="${classes}" ${styleAttr}>${overlay}<span class="${textClass}">${content}</span></${tag}>`;
            }

            let headerTitle = `Day ${activeDay} of 75`;
            let headerSubtitle = "Log your daily progress below.";
            
            if (isGameOver) {
                headerTitle = isPerfect ? "Challenge Complete" : "Challenge Finished";
                headerSubtitle = isPerfect ? "You made it to the end." : "You pushed through to the end.";
            }
            
            const titleClass = isGameOver ? "bg-gradient-to-r from-yellow-500 to-yellow-600 bg-clip-text text-transparent" : "text-slate-950";
            const borderClass = isGameOver ? "border-2 border-yellow-400/50 shadow-yellow-500/20 ring-4 ring-yellow-400/10" : "border border-slate-200 shadow-xl";

            root.innerHTML = `
                <div class="pt-8 animate-fade-in">
                    ${isGameOver ? `<button onclick="nav('victory')" class="bg-white hover:bg-slate-50 text-slate-700 text-[10px] font-black uppercase px-5 py-2.5 rounded-lg mb-6 tracking-widest transition shadow-md border border-slate-300">Back to Stats</button>` : ''}
                    
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="text-slate-600 text-[10px] font-black uppercase tracking-widest mb-1">${state.name ? state.name + "'s" : "Your"} Journey</p>
                            <h1 class="text-3xl sm:text-4xl font-black italic uppercase tracking-tight leading-none pr-2 py-1 ${titleClass}">${headerTitle}</h1>
                            <p class="text-blue-600 text-xs font-bold mt-2">${headerSubtitle}</p>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl ${borderClass}">
                        <div class="grid grid-cols-5 md:grid-cols-10 gap-2">${gridHtml}</div>
                    </div>

                    <div class="mt-12 text-center flex flex-col items-center gap-6">

                        <button onclick="hardReset()" class="w-full max-w-xs border border-red-200 bg-white hover:bg-red-50 text-red-600 px-6 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition shadow-sm">Restart & Change Rules</button>
                        
                        <button onclick="openBackupModal('full')" class="text-slate-400 hover:text-slate-600 text-[9px] font-black uppercase tracking-[0.1em] transition border border-slate-200 px-3 py-1.5 rounded-lg">Backup / Restore Progress</button>
                        
                        ${!isGameOver ? `
                        <div class="flex flex-col gap-2 w-full mt-4 items-center">
                            <p class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Dev Controls</p>
                            <div class="flex gap-2 w-full max-w-xs">
                                <button onclick="devFinish74()" class="flex-1 text-purple-600 hover:bg-purple-50 text-[9px] font-black uppercase tracking-[0.1em] transition border border-purple-200 bg-purple-50/50 px-3 py-2 rounded-lg">Dev Test: Finish 74</button>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderDaily(root) {
            ensureMetricsExist();
            const isAlreadyCompleted = state.completedDays.includes(state.viewingDay);
            const todayMetrics = state.metrics[state.viewingDay];
            
            const totalWater = todayMetrics.waterLogs.reduce((sum, amt) => sum + amt, 0);
            const totalCals = todayMetrics.food.reduce((sum, item) => sum + item.cals, 0);

            // Calculations for amounts left
            const waterLeft = Math.max(0, state.waterGoal - totalWater);
            const calsLeft = Math.max(0, state.calorieGoal - totalCals);

            let checkedTasks = todayMetrics.checkedTasks;
            if (!checkedTasks) {
                checkedTasks = state.tasks.map(() => isAlreadyCompleted);
            }

            const waterColor = totalWater >= state.waterGoal ? 'text-green-600' : 'text-blue-600';
            const calColor = totalCals >= state.calorieGoal ? 'text-green-600' : 'text-orange-600';

            const localPhotoData = window.photoCache[state.viewingDay];

            root.innerHTML = `
                <div class="pt-8 animate-fade-in">
                    <button onclick="nav('grid')" class="bg-white hover:bg-slate-50 text-slate-700 text-[10px] font-black uppercase px-5 py-2.5 rounded-lg mb-8 tracking-widest transition shadow-md border border-slate-300">Back</button>
                    
                    <h2 class="text-3xl sm:text-4xl font-black italic uppercase tracking-tight text-slate-950 mb-2 pr-2">Day ${state.viewingDay}</h2>
                    <p class="text-slate-600 text-xs font-bold uppercase tracking-widest mb-8">Check them off as you go.</p>

                    <div class="glass p-6 rounded-3xl mb-4 shadow-xl border border-slate-200 text-center">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-2 mb-4">Progress Photo</h3>
                        ${localPhotoData ? `
                            <div class="relative rounded-xl overflow-hidden mb-4 border border-slate-200 bg-slate-100 flex items-center justify-center min-h-[300px]">
                                <img src="${localPhotoData}" alt="Day ${state.viewingDay} Progress" class="w-full object-cover rounded-xl shadow-sm aspect-square">
                                
                                <button onclick="downloadPhoto(${state.viewingDay})" class="absolute top-3 right-3 bg-white/90 hover:bg-white text-slate-800 p-2.5 rounded-xl shadow-lg backdrop-blur-sm transition active:scale-95" aria-label="Download Photo">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                    </svg>
                                </button>
                            </div>
                            <button onclick="document.getElementById('photoInput').click()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition border border-slate-200 shadow-sm">Retake Photo</button>
                        ` : `
                            <button onclick="document.getElementById('photoInput').click()" class="w-full bg-slate-50 hover:bg-blue-50 border-2 border-dashed border-slate-300 hover:border-blue-300 text-slate-600 hover:text-blue-600 py-10 rounded-xl font-black text-sm uppercase tracking-widest transition flex flex-col items-center gap-3">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                <span id="photoBtnText">Take Photo Now</span>
                            </button>
                        `}
                        <input type="file" accept="image/*" capture="environment" id="photoInput" class="hidden" onchange="processLocalPhoto(event)">
                    </div>

                    <div class="glass p-6 rounded-3xl mb-4 shadow-xl border border-slate-200">
                        <div class="flex justify-between items-center border-b border-slate-200 pb-3 mb-4">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Water Log</h3>
                            <div class="text-right">
                                <div class="${waterColor} font-bold text-sm leading-none">${totalWater} / ${state.waterGoal} ml</div>
                                <div class="text-[10px] font-bold text-slate-400 mt-1">${waterLeft} ml left</div>
                            </div>
                        </div>
                        <div class="space-y-2 mb-4">
                            ${todayMetrics.waterLogs.map((w, i) => `
                                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                                    <span class="text-sm text-slate-950 font-bold">Water</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-blue-600 font-bold">${w} ml</span>
                                        <button onclick="removeWater(${i})" class="text-red-600 hover:text-red-700 font-black text-sm px-2">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="waterAmount" placeholder="ml" class="w-full bg-white border border-slate-300 rounded-xl p-3 text-sm text-slate-950 font-bold focus:outline-none focus:border-blue-500">
                            <button onclick="addWater()" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-6 rounded-xl font-black transition active:scale-95">+</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl mb-6 shadow-xl border border-slate-200">
                        <div class="flex justify-between items-center border-b border-slate-200 pb-3 mb-4">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Food Log</h3>
                            <div class="text-right">
                                <div class="${calColor} font-bold text-sm leading-none">${totalCals} / ${state.calorieGoal} kcal</div>
                                <div class="text-[10px] font-bold text-slate-400 mt-1">${calsLeft} kcal left</div>
                            </div>
                        </div>
                        <div class="space-y-2 mb-4">
                            ${todayMetrics.food.map((f, i) => `
                                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                                    <span class="text-sm text-slate-950 font-bold">${f.name}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-orange-600 font-bold">${f.cals} kcal</span>
                                        <button onclick="removeFood(${i})" class="text-red-600 hover:text-red-700 font-black text-sm px-2">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="foodName" placeholder="Meal" class="w-full bg-white border border-slate-300 rounded-xl p-3 text-sm text-slate-950 font-bold focus:outline-none focus:border-orange-500">
                            <input type="number" id="foodCals" placeholder="kcal" class="w-24 bg-white border border-slate-300 rounded-xl p-3 text-sm text-slate-950 font-bold focus:outline-none focus:border-orange-500">
                            <button onclick="addFood()" class="bg-orange-100 text-orange-700 hover:bg-orange-200 px-4 rounded-xl font-black transition active:scale-95">+</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl mb-10 shadow-xl space-y-4 border border-slate-200">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-2 mb-4">Non-Negotiables</h3>
                        ${state.tasks.map((t, i) => `
                            <label for="task-${i}" class="bg-slate-50 p-4 rounded-2xl flex items-center gap-4 border border-slate-200 cursor-pointer hover:bg-slate-100 transition shadow-sm select-none">
                                <input type="checkbox" id="task-${i}" ${checkedTasks[i] ? 'checked' : ''} onchange="toggleTask(${i}, this.checked)" class="daily-check shrink-0 w-6 h-6 rounded bg-white border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                                <span class="task-text text-sm font-bold text-slate-950">${t}</span>
                            </label>
                        `).join('')}
                    </div>

                    <div class="flex flex-col gap-4">
                        <button onclick="submitDay()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl uppercase tracking-widest shadow-xl shadow-blue-600/20 transition active:scale-95">Complete Day</button>
                        <button onclick="submitIncomplete()" class="w-full bg-orange-100 text-orange-700 hover:bg-orange-200 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition active:scale-95 border border-orange-200">Mark as Incomplete</button>
                    </div>
                </div>
            `;
        }

        function renderVictory(root) {
            let totalWater = 0;
            let totalMeals = 0;
            let totalCals = 0;

            const isPerfect = state.completedDays.length === 75;
            const completedCount = state.completedDays.length;

            const vTitle = isPerfect ? "VICTORY" : "FINISHED";
            const vSubtitle = isPerfect ? "75 Days of Unbreakable Discipline." : "You pushed through to the end. Be proud of the work.";
            const scoreColor = isPerfect ? "text-green-600" : "text-yellow-600";

            for (let day in state.metrics) {
                const dayMetrics = state.metrics[day];
                if (dayMetrics.waterLogs) {
                    totalWater += dayMetrics.waterLogs.reduce((a, b) => a + b, 0);
                }
                if (dayMetrics.food) {
                    totalCals += dayMetrics.food.reduce((a, b) => a + b.cals, 0);
                    totalMeals += dayMetrics.food.length;
                }
            }

            const totalLiters = (totalWater / 1000).toFixed(1);

            // Fetch Day 1 vs Day 75 photos
            const photoDay1 = window.photoCache[1];
            const photoDay75 = window.photoCache[75];
            let comparisonHtml = '';

            if (photoDay1 && photoDay75) {
                comparisonHtml = `
                    <div class="glass p-6 rounded-3xl w-full max-w-md shadow-2xl border border-slate-200 mb-8 relative overflow-hidden bg-slate-50">
                        <h2 class="text-lg font-black text-slate-900 uppercase tracking-wider mb-5 text-center">Day 1 vs Day 75</h2>
                        <div class="flex gap-4">
                            <div class="flex-1 flex flex-col items-center">
                                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Started</span>
                                <div class="w-full aspect-square rounded-xl overflow-hidden shadow border border-slate-300 bg-white relative">
                                    <img src="${photoDay1}" alt="Day 1" class="w-full h-full object-cover">
                                    <button onclick="downloadPhoto(1)" class="absolute top-1 right-1 bg-white/90 hover:bg-white text-slate-800 p-1.5 rounded-lg shadow backdrop-blur-sm transition active:scale-95" aria-label="Download Photo">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col items-center">
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-2">Finished</span>
                                <div class="w-full aspect-square rounded-xl overflow-hidden shadow-md border-2 border-blue-500 bg-white relative">
                                    <img src="${photoDay75}" alt="Day 75" class="w-full h-full object-cover">
                                    <button onclick="downloadPhoto(75)" class="absolute top-1 right-1 bg-white/90 hover:bg-white text-slate-800 p-1.5 rounded-lg shadow backdrop-blur-sm transition active:scale-95" aria-label="Download Photo">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            root.innerHTML = `
                <div class="pt-8 animate-fade-in flex flex-col items-center text-center">
                    <div class="w-full flex justify-start mb-4">
                        <button onclick="nav('grid')" class="bg-white hover:bg-slate-50 text-slate-700 text-[10px] font-black uppercase px-5 py-2.5 rounded-lg tracking-widest transition shadow-md border border-slate-300">View Golden Grid</button>
                    </div>

                    <div class="mb-10 mt-6">
                        <h1 class="text-5xl sm:text-6xl font-black italic uppercase tracking-tight bg-gradient-to-br from-yellow-400 via-yellow-500 to-yellow-600 bg-clip-text text-transparent drop-shadow-sm mb-2 pr-2 py-1">${vTitle}</h1>
                        <p class="text-slate-800 text-sm font-bold uppercase tracking-widest">${vSubtitle}</p>
                    </div>

                    ${comparisonHtml}

                    <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl border-2 border-yellow-400/50 mb-8 relative overflow-hidden bg-gradient-to-b from-yellow-50 to-white">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-300"></div>
                        <h2 class="text-xl font-black text-slate-900 uppercase tracking-wider mb-8">${state.name ? state.name + "'s" : "Your"} Final Stats</h2>

                        <div class="space-y-5 text-left">
                            <div class="flex justify-between items-center border-b border-yellow-200 pb-3">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Water Drank</span>
                                <span class="text-lg font-black text-blue-600">${totalLiters} Liters</span>
                            </div>
                            <div class="flex justify-between items-center border-b border-yellow-200 pb-3">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Meals Tracked</span>
                                <span class="text-lg font-black text-orange-600">${totalMeals}</span>
                            </div>
                            <div class="flex justify-between items-center border-b border-yellow-200 pb-3">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Days Conquered</span>
                                <span class="text-lg font-black ${scoreColor}">${completedCount} / 75</span>
                            </div>
                        </div>

                        <p class="mt-8 text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center">Screenshot to share your victory!</p>
                    </div>

                    <button onclick="fireVictoryConfetti()" class="text-yellow-600 hover:bg-yellow-50 text-[10px] font-black uppercase tracking-[0.1em] transition border border-yellow-200 bg-yellow-50/50 px-6 py-3 rounded-xl mb-12 shadow-sm">Celebrate Again</button>
                </div>
            `;
        }

        // --- PHOTO DOWNLOAD FUNCTION (STRICT OS SPLIT) ---
        async function downloadPhoto(dayNumber) {
            const dataUrl = window.photoCache[dayNumber];
            if (!dataUrl) return;

            // Detect if the device is an Apple/iOS device
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isIOS) {
                // STRCITLY iOS: Open the Native Share Sheet
                try {
                    const response = await fetch(dataUrl);
                    const blob = await response.blob();
                    const file = new File([blob], `75Hard_Day${dayNumber}_Progress.jpg`, { type: 'image/jpeg' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: '75 Hard Progress',
                            text: `Day ${dayNumber} photo!`
                        });
                    } else {
                        alert("To save this photo, long-press the image and select 'Save to Photos'.");
                    }
                } catch (err) {
                    console.log("Share API error or cancelled:", err);
                }
            } else {
                // STRICTLY ANDROID/PC: Force direct download popup
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `75Hard_Day${dayNumber}_Progress.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        // --- SILENT LOCAL PHOTO PROCESSING ---
        function processLocalPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            const btnText = document.getElementById('photoBtnText');
            if (btnText) btnText.innerText = "Processing Image... ⏳";

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Force a perfect SQUARE crop
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    
                    const offsetX = (img.width - size) / 2;
                    const offsetY = (img.height - size) / 2;
                    
                    ctx.drawImage(img, offsetX, offsetY, size, size, 0, 0, size, size);
                    
                    // Compress it slightly
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                    // Save directly to the browser's hidden vault (IndexedDB)
                    const transaction = db.transaction(["photos"], "readwrite");
                    const store = transaction.objectStore("photos");
                    store.put(dataUrl, state.viewingDay);

                    transaction.oncomplete = () => {
                        window.photoCache[state.viewingDay] = dataUrl;
                        ensureMetricsExist();
                        state.metrics[state.viewingDay].hasLocalPhoto = true;
                        save(); // Immediately refreshes the UI to show the photo without downloading!
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Navigation
        function nav(view) {
            state.view = view;
            window.scrollTo(0, 0);
            save();
        }

        function openDay(dayNumber) {
            state.viewingDay = dayNumber;
            nav('daily');
        }

        // Metrics logic
        function ensureMetricsExist() {
            if (!state.metrics[state.viewingDay]) {
                state.metrics[state.viewingDay] = { waterLogs: [], food: [], checkedTasks: [] };
            }
            if (!state.metrics[state.viewingDay].checkedTasks) {
                const isAlreadyCompleted = state.completedDays.includes(state.viewingDay);
                state.metrics[state.viewingDay].checkedTasks = state.tasks.map(() => isAlreadyCompleted);
            }
            if (!state.metrics[state.viewingDay].waterLogs) state.metrics[state.viewingDay].waterLogs = [];
            if (!state.metrics[state.viewingDay].food) state.metrics[state.viewingDay].food = [];
        }

        function toggleTask(index, isChecked) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].checkedTasks[index] = isChecked;
            localStorage.setItem('75hard_state', JSON.stringify(state));
        }

        function addWater() {
            const amountEl = document.getElementById('waterAmount');
            const amount = parseInt(amountEl.value);
            if (isNaN(amount) || amount <= 0) return alert("Please enter a valid amount.");
            ensureMetricsExist();
            state.metrics[state.viewingDay].waterLogs.push(amount);
            amountEl.value = ""; 
            save(); 
        }

        function removeWater(index) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].waterLogs.splice(index, 1);
            save();
        }

        function addFood() {
            const nameEl = document.getElementById('foodName');
            const calsEl = document.getElementById('foodCals');
            const name = nameEl.value.trim();
            const cals = parseInt(calsEl.value);
            if (!name || isNaN(cals)) return alert("Please enter both a meal name and calories.");
            ensureMetricsExist();
            state.metrics[state.viewingDay].food.push({ name, cals });
            nameEl.value = ""; 
            calsEl.value = ""; 
            save(); 
        }

        function removeFood(index) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].food.splice(index, 1);
            save();
        }

        // Setup logic
        function syncSetupForm() {
            const nameEl = document.getElementById('userName');
            const waterEl = document.getElementById('setupWater');
            const calsEl = document.getElementById('setupCals');
            if (nameEl) state.name = nameEl.value.trim();
            if (waterEl) state.waterGoal = parseInt(waterEl.value) || 4000;
            if (calsEl) state.calorieGoal = parseInt(calsEl.value) || 2500;
        }

        function toggleEditRules() {
            syncSetupForm();
            state.editingRules = !state.editingRules;
            renderSetup(document.getElementById('app'));
        }

        function updateTask(index, val) { state.tasks[index] = val; }
        
        function removeTask(index) { 
            syncSetupForm();
            state.tasks.splice(index, 1); 
            renderSetup(document.getElementById('app')); 
        }
        
        function addTask() { 
            syncSetupForm();
            state.tasks.push("New rule"); 
            renderSetup(document.getElementById('app')); 
        }

        function lockIn() {
            syncSetupForm();
            if (state.tasks.length === 0) return alert("You need at least one rule!");
            if (confirm("Once you start, you cannot change your rules. Ready to commit?")) {
                state.locked = true;
                nav('grid');
            }
        }

        function submitDay() {
            const checkboxes = document.querySelectorAll('.daily-check');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            if (!allChecked) return alert("You haven't ticked all your Non-Negotiable boxes!");
            
            ensureMetricsExist();
            state.metrics[state.viewingDay].checkedTasks = Array.from(checkboxes).map(cb => cb.checked);
            state.incompleteDays = state.incompleteDays.filter(d => d !== state.viewingDay);
            
            if (!state.completedDays.includes(state.viewingDay)) state.completedDays.push(state.viewingDay);
            
            if (getActiveDay() > 75) {
                nav('victory');
                fireVictoryConfetti();
            } else {
                nav('grid');
            }
        }

        function submitIncomplete() {
            if (confirm(`Log Day ${state.viewingDay} as incomplete?`)) {
                ensureMetricsExist();
                const checkboxes = document.querySelectorAll('.daily-check');
                state.metrics[state.viewingDay].checkedTasks = Array.from(checkboxes).map(cb => cb.checked);
                state.completedDays = state.completedDays.filter(d => d !== state.viewingDay);
                if (!state.incompleteDays.includes(state.viewingDay)) state.incompleteDays.push(state.viewingDay);
                
                if (getActiveDay() > 75) {
                    nav('victory');
                    fireVictoryConfetti();
                } else {
                    nav('grid');
                }
            }
        }

        function hardReset() {
            if (confirm("DANGER: This will wipe all your progress AND let you re-write your rules. Go back to Setup?")) {
                state.locked = false;
                state.editingRules = false;
                state.completedDays = [];
                state.incompleteDays = [];
                state.metrics = {}; 
                state.tasks = [...DEFAULT_TASKS];
                state.waterGoal = 4000;
                state.calorieGoal = 2500;
                
                // Clear local photos
                const transaction = db.transaction(["photos"], "readwrite");
                transaction.objectStore("photos").clear();
                window.photoCache = {};

                nav('setup');
            }
        }

        // DEV TOOLS
        function devFinishPerfect() {
            if (confirm("DEV TOOL: Set first 74 days as COMPLETE?")) {
                state.completedDays = Array.from({length: 74}, (_, i) => i + 1);
                state.incompleteDays = [];
                for (let i = 1; i <= 74; i++) {
                    state.metrics[i] = { waterLogs: [2000, 2000], food: [{name: "Chicken Rice", cals: 800}, {name: "Protein Shake", cals: 400}], checkedTasks: state.tasks.map(() => true) };
                }
                nav('grid');
            }
        }

        function devFinishPartial() {
            if (confirm("DEV TOOL: Set 70 days complete, 4 missed?")) {
                state.completedDays = Array.from({length: 70}, (_, i) => i + 1);
                state.incompleteDays = [71, 72, 73, 74];
                for (let i = 1; i <= 74; i++) {
                    state.metrics[i] = { waterLogs: [2000, 2000], food: [{name: "Chicken Rice", cals: 800}], checkedTasks: state.tasks.map(() => true) };
                }
                nav('grid');
            }
        }

        function devFinish74() {
            if (confirm("DEV TOOL: Instantly complete days 1-74?")) {
                state.completedDays = Array.from({length: 74}, (_, i) => i + 1);
                state.incompleteDays = [];
                for (let i = 1; i <= 74; i++) {
                    state.metrics[i] = { waterLogs: [2000, 2000], food: [{name: "Chicken Rice", cals: 800}], checkedTasks: state.tasks.map(() => true), hasLocalPhoto: false };
                }
                nav('grid');
            }
        }
        
        // Data management (Backup/Restore)
        function openBackupModal(mode) {
            if (state.view === 'setup') {
                syncSetupForm();
            }
            
            const codeEl = document.getElementById('backupCodeDisplay');
            const restoreIn = document.getElementById('restoreInput');
            const copySec = document.getElementById('copySection');
            const restoreOnlyClose = document.getElementById('restoreOnlyClose');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const restoreTitle = document.getElementById('restoreTitle');
            
            restoreIn.value = ""; 
            
            if (mode === 'restore-only') {
                copySec.classList.add('hidden');
                restoreOnlyClose.classList.remove('hidden');
                title.innerText = "RESTORE SAVE";
                desc.innerText = "Paste your backup code below to pick up exactly where you left off.";
                restoreTitle.classList.add('hidden'); 
            } else {
                const dataString = "75HARD-v1|" + btoa(JSON.stringify(state));
                codeEl.value = dataString;
                copySec.classList.remove('hidden');
                restoreOnlyClose.classList.add('hidden');
                title.innerText = "DATA LIFELINE";
                desc.innerText = "Text this code to yourself to backup progress, or paste a code to restore.";
                restoreTitle.classList.remove('hidden');
            }
            
            document.getElementById('backupModal').classList.remove('hidden');
        }
        
        function closeBackupModal() {
            document.getElementById('backupModal').classList.add('hidden');
        }
        
        function copyBackupCode() {
            const codeEl = document.getElementById('backupCodeDisplay');
            codeEl.select();
            document.execCommand('copy');
            alert("Backup code copied to clipboard! Text it to yourself.");
        }
        
        function restoreData() {
            const input = document.getElementById('restoreInput').value.trim();
            if (!input) return;
            
            if (!input.startsWith("75HARD-v1|") && !input.startsWith("75C-v1|")) {
                alert("Invalid backup code format.");
                return;
            }
            
            if (confirm("Restoring will overwrite current progress. Are you sure?")) {
                try {
                    const base64part = input.split('|')[1];
                    const decodedData = JSON.parse(atob(base64part));
                    
                    if (decodedData && decodedData.tasks && Array.isArray(decodedData.completedDays)) {
                        state = decodedData;
                        state.editingRules = false; 
                        
                        // Fix view state on restore if they already won
                        if (getActiveDay() > 75) {
                            state.view = 'victory';
                        }
                        
                        save(); 
                        closeBackupModal();
                        alert("Progress restored successfully!");
                    } else {
                        throw new Error("Invalid data structure");
                    }
                } catch (e) {
                    alert("Failed to restore data. The code might be corrupted.");
                    console.error(e);
                }
            }
        }

        // Initialize the app ONLY after the photo database loads
        initDB.then(() => {
            render();
        });

        // PWA init
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
              .then(reg => console.log('SW registered', reg))
              .catch(err => console.log('SW failed', err));
          });
        }
    </script>
</body>
